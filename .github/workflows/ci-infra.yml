name: Infrastructure Core

on:
  workflow_call:

env:
  AWS_REGION: "us-east-1"

jobs:
  cf-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync Base Infrastructure Stack
        run: |
          aws cloudformation deploy \
            --stack-name mvp-infra-base \
            --template-file infra/infrastructure.yaml \
            --capabilities CAPABILITY_IAM

      - name: Sync Compute Layer Stack
        run: |
          aws cloudformation deploy \
            --stack-name mvp-compute-layer \
            --template-file infra/compute.yaml \
            --parameter-overrides BaseStackName=mvp-infra-base ContainerPort=8080 \
            --capabilities CAPABILITY_IAM
