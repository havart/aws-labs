name: Infrastructure Core

on:
  workflow_call:

env:
  AWS_REGION: "us-east-1"

jobs:
  cf-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync Base Infrastructure Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: mvp-infra-base
          template: infra/infrastructure.yaml
          no-fail-on-empty-changeset: "true"

      - name: Sync Compute Layer Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: mvp-compute-layer
          template: infra/compute.yaml
          no-fail-on-empty-changeset: "true"
          parameter-overrides: "BaseStackName=mvp-infra-base,ContainerPort=8080"
          capabilities: CAPABILITY_IAM
