name: Application Lifecycle

on:
  workflow_call:

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "mvp-launcher-repo"
  ECS_CLUSTER: "mvp-launcher-cluster"

defaults:
  run:
    working-directory: app

jobs:
  # Step A: Build Docker Image
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # Step B: Deploy to Stage Environment (Auto)
  deploy-stage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          EXEC_ROLE_ARN=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ECSTaskExecutionRoleArn'].OutputValue" --output text)
          SUBNET_A=$(aws cloudformation describe-stacks --stack-name mvp-infra-base --query "Stacks[0].Outputs[?OutputKey=='PublicSubnetA'].OutputValue" --output text)
          SUBNET_B=$(aws cloudformation describe-stacks --stack-name mvp-infra-base --query "Stacks[0].Outputs[?OutputKey=='PublicSubnetB'].OutputValue" --output text)
          SG_ID=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ContainerSecurityGroupId'].OutputValue" --output text)
          TG_STAGE=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ALBTargetGroupStageArn'].OutputValue" --output text)

          cat <<EOF > task-def-stage.json
          {"family": "mvp-task-Stage", "networkMode": "awsvpc", "executionRoleArn": "${EXEC_ROLE_ARN}",
          "containerDefinitions": [{"name": "mvp-container", "image": "${{ needs.build.outputs.image_uri }}", "essential": true,
          "portMappings": [{"containerPort": 80, "hostPort": 80}], "environment": [{"name": "ENV", "value": "Stage"}],
          "logConfiguration": {"logDriver": "awslogs", "options": {"awslogs-group": "/ecs/mvp-compute-layer-launcher", "awslogs-region": "${{ env.AWS_REGION }}", "awslogs-stream-prefix": "ecs"}}}
          }], "requiresCompatibilities": ["FARGATE"], "cpu": "256", "memory": "512"}
          EOF

          TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://task-def-stage.json --query "taskDefinition.taskDefinitionArn" --output text)
          if aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services mvp-service-Stage --query "services[0].status" --output text | grep -q "ACTIVE"; then
            echo "Updating existing service..."
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service-name mvp-service-Stage --task-definition $TASK_ARN
          else
            echo "Creating new service..."
            aws ecs create-service --cluster ${{ env.ECS_CLUSTER }} --service-name mvp-service-Stage --task-definition $TASK_ARN --launch-type FARGATE --desired-count 1 --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_A,$SUBNET_B],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" --load-balancers "targetGroupArn=$TG_STAGE,containerName=mvp-container,containerPort=80"
          fi

  # Step C: Deploy to Production Environment (Manual Approval Required)
  deploy-production:
    needs: [build, deploy-stage]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          EXEC_ROLE_ARN=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ECSTaskExecutionRoleArn'].OutputValue" --output text)
          SUBNET_A=$(aws cloudformation describe-stacks --stack-name mvp-infra-base --query "Stacks[0].Outputs[?OutputKey=='PublicSubnetA'].OutputValue" --output text)
          SUBNET_B=$(aws cloudformation describe-stacks --stack-name mvp-infra-base --query "Stacks[0].Outputs[?OutputKey=='PublicSubnetB'].OutputValue" --output text)
          SG_ID=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ContainerSecurityGroupId'].OutputValue" --output text)
          TG_PROD=$(aws cloudformation describe-stacks --stack-name mvp-compute-layer --query "Stacks[0].Outputs[?OutputKey=='ALBTargetGroupProdArn'].OutputValue" --output text)

          cat <<EOF > task-def-prod.json
          {"family": "mvp-task-Production", "networkMode": "awsvpc", "executionRoleArn": "${EXEC_ROLE_ARN}",
          "containerDefinitions": [{"name": "mvp-container", "image": "${{ needs.build.outputs.image_uri }}", "essential": true,
          "portMappings": [{"containerPort": 80, "hostPort": 80}], "environment": [{"name": "ENV", "value": "Production"}],
          "logConfiguration": {"logDriver": "awslogs", "options": {"awslogs-group": "/ecs/mvp-compute-layer-launcher", "awslogs-region": "${{ env.AWS_REGION }}", "awslogs-stream-prefix": "ecs"}}}
          }], "requiresCompatibilities": ["FARGATE"], "cpu": "256", "memory": "512"}
          EOF

          TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://task-def-prod.json --query "taskDefinition.taskDefinitionArn" --output text)
          if aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services mvp-service-Production --query "services[0].status" --output text | grep -q "ACTIVE"; then
            echo "Updating existing service..."
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service-name mvp-service-Production --task-definition $TASK_ARN
          else
            echo "Creating new service..."
            aws ecs create-service --cluster ${{ env.ECS_CLUSTER }} --service-name mvp-service-Production --task-definition $TASK_ARN --launch-type FARGATE --desired-count 1 --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_A,$SUBNET_B],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" --load-balancers "targetGroupArn=$TG_PROD,containerName=mvp-container,containerPort=80"
          fi
